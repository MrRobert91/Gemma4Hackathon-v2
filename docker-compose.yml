services:
  backend:
    build:
      context: ./backend
      args:
        ENABLE_GEMMA: ${ENABLE_GEMMA:-false}
    environment:
      TTS_PROVIDER: mock
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:8080
      PROFILE_DB_PATH: /app/data/profiles.db
      GEMMA_PROVIDER: ${GEMMA_PROVIDER:-none}
      GEMMA_MODEL_ID: ${GEMMA_MODEL_ID:-google/gemma-4-E4B-it}
      GEMMA_BASE_URL: ${GEMMA_BASE_URL:-http://host.docker.internal:11434/v1}
      GEMMA_API_KEY: ${GEMMA_API_KEY:-unused}
      HF_TOKEN: ${HF_TOKEN:-}
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app/data

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  backend-data:
